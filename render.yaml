services:
  - type: web
    name: instraeach-backend
    runtime: node
    rootDir: backend
    buildCommand: npm run build
    startCommand: node server.js
    healthCheckPath: /health

    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: changeme123
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: "*"
      - key: SESSION_ID
        sync: false
      - key: ACCOUNT_ID
        sync: false
      - key: IG_USERNAME
        value: manofox_official
      - key: CRON_KEY
        value: instraeach_cron_2024

    disk:
      name: instraeach-data
      mountPath: /var/data
      sizeGB: 1